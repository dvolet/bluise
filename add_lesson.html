{% extends "base.html" %}

{% block content %}

<div class="auth-container">
    <div class="auth-box">

        <h2>Add Lesson</h2>

        <form method="POST">

            <input type="text" name="title" placeholder="Lesson Title" required>

            <input type="text" name="video_url" placeholder="YouTube Embed URL" required>

            <input type="number" name="position" placeholder="Order (1,2,3...)" required>

            <button type="submit">Add Lesson</button>

        </form>

    </div>
</div>

{% endblock %}
