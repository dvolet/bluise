<h2>Edit Course</h2>

<form method="POST">
    <input type="text" name="title" value="{{ course['title'] }}" required><br><br>

    <textarea name="description" required>{{ course['description'] }}</textarea><br><br>

    <textarea name="content" required>{{ course['content'] }}</textarea><br><br>

    <input type="text" name="video_url" placeholder="YouTube Embed Link">

    <button type="submit">Update Course</button>
</form>
