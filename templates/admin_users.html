{% extends "base.html" %}

{% block content %}

<div class="dashboard-container">

    <h2>👥 User Management</h2>

    <div class="course-grid">

        {% for user in users %}

        <div class="card">

            <h3>{{ user.email }}</h3>

            <p>🟢 Active</p>

            <div class="btn-group">

                <a href="/admin/user/toggle/{{ user.id }}" class="btn btn-primary">
                    Toggle
                </a>

                <a href="/admin/user/delete/{{ user.id }}" class="btn btn-danger"
                   onclick="return confirm('Delete user?')">
                    Delete
                </a>

            </div>

        </div>

        {% endfor %}

    </div>

</div>

{% endblock %}
