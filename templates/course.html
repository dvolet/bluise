<h2 class="course-title">{{ course.title }}</h2>

<p class="course-desc">{{ course.description }}</p>

<!-- 📊 PROGRESS DISPLAY (CONNECTED FEATURE) -->
<div class="progress-display">

    <h4>Your Progress: {{ progress }}%</h4>

    <div class="progress-track">
        <div class="progress-fill" style="width: {{ progress }}%;"></div>
    </div>

</div>

<div class="course-layout">

    <!-- 🎥 LEFT: VIDEO + CONTENT -->
    <div class="course-video">

        {% if course.video_url %}
        <div class="video-container">
            <iframe 
                width="100%" 
                height="420"
                src="{{ course.video_url }}"
                frameborder="0"
                allowfullscreen>
            </iframe>
        </div>
        {% endif %}

        <!-- 📄 CONTENT -->
        <div class="course-content-box">
            <h3>Course Content</h3>
            <p>{{ course.content }}</p>
        </div>

    </div>

    <!-- 📊 RIGHT: PROGRESS CONTROL + ENROLL -->
    <div class="course-sidebar">

        <!-- 🚀 ENROLL SECTION (NEW STEP 1 FIX) -->
        <div class="progress-box">
            <h3>Enroll in Course</h3>

            <a href="/enroll/{{ course.id }}" class="progress-btn">
                Enroll Now
            </a>
        </div>

        <!-- 📊 PROGRESS CONTROL -->
        <div class="progress-box" style="margin-top:15px;">
            <h3>Update Progress</h3>

            <a href="/progress/{{ course.id }}/10" class="progress-btn">10%</a>
            <a href="/progress/{{ course.id }}/50" class="progress-btn">50%</a>
            <a href="/progress/{{ course.id }}/100" class="progress-btn complete">Complete</a>

        </div>

    </div>

</div>
