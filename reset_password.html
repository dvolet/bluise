{% extends "base.html" %}

{% block content %}

<div class="auth-container">

    <div class="auth-box">

        <h2>Reset Password</h2>
        <p>Enter your new password</p>

        <form method="POST">

            <!-- NEW PASSWORD -->
            <div style="position:relative; width:100%; margin-bottom:10px;">

                <input 
                    type="password" 
                    id="password"
                    name="password"
                    placeholder="New Password"
                    required
                    onkeyup="handlePasswordInput('password','confirm_password','strength','suggestion','error-msg','submitBtn')"
                >

                <span onclick="togglePassword('password', this)"
                      style="position:absolute; right:12px; top:50%; transform:translateY(-50%); cursor:pointer; font-size:18px; color:#64748b;">
                    👁️
                </span>

            </div>

            <!-- CONFIRM PASSWORD -->
            <div style="position:relative; width:100%; margin-bottom:10px;">

                <input 
                    type="password" 
                    id="confirm_password"
                    name="confirm_password"
                    placeholder="Confirm Password"
                    required
                    onkeyup="handlePasswordInput('password','confirm_password','strength','suggestion','error-msg','submitBtn')"
                >

                <span onclick="togglePassword('confirm_password', this)"
                      style="position:absolute; right:12px; top:50%; transform:translateY(-50%); cursor:pointer; font-size:18px; color:#64748b;">
                    👁️
                </span>

            </div>

            <!-- STRENGTH -->
            <p id="strength" style="margin-top:10px;"></p>

            <!-- SUGGESTIONS -->
            <p id="suggestion" style="font-size:13px; color:gray;"></p>

            <!-- ERROR -->
            <p id="error-msg" style="color:red; display:none;">
                Passwords do not match
            </p>

            <!-- SUBMIT -->
            <button id="submitBtn" type="submit" disabled style="margin-top:15px;">
                Update Password
            </button>

        </form>

    </div>

</div>

<!-- TOGGLE SCRIPT (MATCH REGISTER PAGE) -->
<script>
function togglePassword(inputId, el) {
    const input = document.getElementById(inputId);

    if (input.type === "password") {
        input.type = "text";
        el.innerHTML = "🙈";
    } else {
        input.type = "password";
        el.innerHTML = "👁️";
    }
}
</script>

{% endblock %}
